
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體感 Flappy Bird (輕快放慢版)</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #222;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            border: 4px solid #fff;
            border-radius: 10px;
            margin-top: 20px;
            background-color: #000;
        }
        #loading {
            position: absolute;
            top: 50%;
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

    <h2>體感 Flappy Bird - 雙手手掌相碰來跳躍！</h2>
    <div id="loading">載入 AI 模型與攝影機中，請稍候...</div>
    
    <video id="video" width="640" height="480" style="display: none;" autoplay playsinline></video>
    <canvas id="gameCanvas" width="640" height="480"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('gameCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        // --- 遊戲狀態定義 ---
        const STATES = {
            LOADING: 'LOADING',
            TESTING: 'TESTING',
            PLAYING: 'PLAYING',
            GAMEOVER: 'GAMEOVER'
        };
        let currentState = STATES.LOADING;

        // --- 遊戲變數 ---
        const WIDTH = canvasElement.width;
        const HEIGHT = canvasElement.height;
        
        // 【已修改】調整物理參數，讓重力更輕 (0.4)、向上的力道更溫和 (-8)，呈現慢速漂浮感
        let bird = { x: 100, y: HEIGHT / 2, radius: 15, velocity: 0, gravity: 0.4, flapPower: -8 };
        
        // 【已修改】將柱子移動速度從 5 降至 4，讓玩家有更多反應時間
        let pipe = { x: WIDTH, width: 60, gap: 150, speed: 4, topHeight: 0 }; 
        
        let score = 0;
        let isPalmsTouching = false; 
        let testSuccessTimer = 0;

        function resetPipe() {
            pipe.x = WIDTH;
            pipe.topHeight = Math.floor(Math.random() * (HEIGHT - 200)) + 50;
        }

        function resetGame() {
            bird.y = HEIGHT / 2;
            bird.velocity = 0;
            score = 0;
            resetPipe();
            currentState = STATES.PLAYING;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r' && currentState === STATES.GAMEOVER) {
                resetGame();
            }
        });

        // --- MediaPipe Pose 初始化 ---
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            if (currentState === STATES.LOADING) {
                loadingText.style.display = 'none';
                currentState = STATES.TESTING;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, WIDTH, HEIGHT);

            // 1. 繪製攝影機畫面 (水平翻轉)
            canvasCtx.translate(WIDTH, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, WIDTH, HEIGHT);
            canvasCtx.translate(WIDTH, 0);
            canvasCtx.scale(-1, 1);

            // 2. 核心偵測邏輯
            let palmsCollided = false;
            let leftPalmPos = null;

            if (results.poseLandmarks) {
                const landmarks = results.poseLandmarks;
                
                // 節點 19, 20 代表左/右食指指根（最貼近手掌中心的節點）
                const leftPalm = landmarks[19];
                const rightPalm = landmarks[20];

                if (leftPalm.visibility > 0.5 && rightPalm.visibility > 0.5) {
                    const dx = leftPalm.x - rightPalm.x;
                    const dy = leftPalm.y - rightPalm.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    const threshold = 0.08;

                    leftPalmPos = { x: (1 - leftPalm.x) * WIDTH, y: leftPalm.y * HEIGHT };

                    if (distance < threshold) {
                        palmsCollided = true;
                    }
                }
            }

            // 3. 狀態機邏輯
            switch (currentState) {
                
                case STATES.TESTING:
                    canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);

                    canvasCtx.fillStyle = '#00ff00';
                    canvasCtx.font = 'bold 30px Arial';
                    canvasCtx.textAlign = 'center';
                    canvasCtx.fillText("【 操控測試 Calibration 】", WIDTH / 2, HEIGHT / 2 - 60);

                    canvasCtx.fillStyle = 'white';
                    canvasCtx.font = '20px Arial';
                    canvasCtx.fillText("請退後至全身入鏡，並將雙手手掌相碰一次", WIDTH / 2, HEIGHT / 2 - 10);

                    if (palmsCollided) {
                        if (!isPalmsTouching) {
                            isPalmsTouching = true;
                            testSuccessTimer = 60; // 倒數約 2 秒
                        }
                    } else {
                        isPalmsTouching = false;
                    }

                    if (palmsCollided && leftPalmPos) {
                        canvasCtx.beginPath();
                        canvasCtx.arc(leftPalmPos.x, leftPalmPos.y, 40, 0, 2 * Math.PI);
                        canvasCtx.strokeStyle = 'cyan';
                        canvasCtx.lineWidth = 5;
                        canvasCtx.stroke();
                    }

                    if (testSuccessTimer > 0) {
                        testSuccessTimer--;
                        canvasCtx.fillStyle = 'cyan';
                        canvasCtx.font = 'bold 24px Arial';
                        canvasCtx.fillText("測試成功！遊戲即將開始...", WIDTH / 2, HEIGHT / 2 + 50);

                        if (testSuccessTimer === 0) {
                            resetGame();
                        }
                    }
                    break;

                case STATES.PLAYING:
                    bird.velocity += bird.gravity;
                    bird.y += bird.velocity;

                    pipe.x -= pipe.speed;
                    if (pipe.x < -pipe.width) {
                        resetPipe();
                        score++;
                    }

                    if (palmsCollided) {
                        if (!isPalmsTouching) {
                            bird.velocity = bird.flapPower;
                            isPalmsTouching = true;
                        }
                        if (leftPalmPos) {
                            canvasCtx.beginPath();
                            canvasCtx.arc(leftPalmPos.x, leftPalmPos.y, 25, 0, 2 * Math.PI);
                            canvasCtx.strokeStyle = 'cyan';
                            canvasCtx.lineWidth = 3;
                            canvasCtx.stroke();
                        }
                    } else {
                        isPalmsTouching = false;
                    }

                    // 邊界與柱子碰撞偵測
                    if (bird.y - bird.radius < 0 || bird.y + bird.radius > HEIGHT) currentState = STATES.GAMEOVER;
                    if (bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + pipe.width) {
                        if (bird.y - bird.radius < pipe.topHeight || bird.y + bird.radius > pipe.topHeight + pipe.gap) {
                            currentState = STATES.GAMEOVER;
                        }
                    }

                    // 繪製遊戲元素
                    canvasCtx.fillStyle = 'limegreen';
                    canvasCtx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
                    canvasCtx.fillRect(pipe.x, pipe.topHeight + pipe.gap, pipe.width, HEIGHT - (pipe.topHeight + pipe.gap));

                    canvasCtx.beginPath();
                    canvasCtx.arc(bird.x, bird.y, bird.radius, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = 'red';
                    canvasCtx.fill();

                    canvasCtx.fillStyle = 'white';
                    canvasCtx.font = '30px Arial';
                    canvasCtx.textAlign = 'left';
                    canvasCtx.fillText(`Score: ${score}`, 20, 40);
                    break;

                case STATES.GAMEOVER:
                    canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);
                    
                    canvasCtx.fillStyle = 'red';
                    canvasCtx.font = '50px Arial';
                    canvasCtx.textAlign = 'center';
                    canvasCtx.fillText("GAME OVER", WIDTH / 2, HEIGHT / 2);
                    
                    canvasCtx.fillStyle = 'white';
                    canvasCtx.font = '20px Arial';
                    canvasCtx.fillText("Press 'R' to Restart", WIDTH / 2, HEIGHT / 2 + 40);
                    break;
            }

            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
