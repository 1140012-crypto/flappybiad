<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體感 Flappy Bird (含操控測試)</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #222;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            border: 4px solid #fff;
            border-radius: 10px;
            margin-top: 20px;
            background-color: #000;
        }
        #loading {
            position: absolute;
            top: 50%;
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

    <h2>體感 Flappy Bird - 雙手手腕相碰來跳躍！</h2>
    <div id="loading">載入 AI 模型與攝影機中，請稍候...</div>
    
    <video id="video" width="640" height="480" style="display: none;" autoplay playsinline></video>
    <canvas id="gameCanvas" width="640" height="480"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('gameCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        // --- 遊戲狀態定義 ---
        const STATES = {
            LOADING: 'LOADING',
            TESTING: 'TESTING',     // 新增：操控測試狀態
            PLAYING: 'PLAYING',
            GAMEOVER: 'GAMEOVER'
        };
        let currentState = STATES.LOADING;

        // --- 遊戲變數 ---
        const WIDTH = canvasElement.width;
        const HEIGHT = canvasElement.height;
        let bird = { x: 100, y: HEIGHT / 2, radius: 15, velocity: 0, gravity: 0.8, flapPower: -12 };
        let pipe = { x: WIDTH, width: 60, gap: 150, speed: 5, topHeight: 0 };
        let score = 0;
        let isWristsTouching = false;
        let testSuccessTimer = 0; // 用於測試成功後的倒數計時

        function resetPipe() {
            pipe.x = WIDTH;
            pipe.topHeight = Math.floor(Math.random() * (HEIGHT - 200)) + 50;
        }

        function resetGame() {
            bird.y = HEIGHT / 2;
            bird.velocity = 0;
            score = 0;
            resetPipe();
            currentState = STATES.PLAYING;
        }

        // 鍵盤 R 重置遊戲（只有在 GAME OVER 時有用）
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r' && currentState === STATES.GAMEOVER) {
                resetGame();
            }
        });

        // --- MediaPipe Pose 初始化 ---
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            // 處理初始載入
            if (currentState === STATES.LOADING) {
                loadingText.style.display = 'none';
                currentState = STATES.TESTING; // 載入完成後，進入測試模式
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, WIDTH, HEIGHT);

            // 1. 繪製攝影機畫面 (水平翻轉)
            canvasCtx.translate(WIDTH, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, WIDTH, HEIGHT);
            canvasCtx.translate(WIDTH, 0);
            canvasCtx.scale(-1, 1);

            // 2. 核心偵測邏輯 (不論在哪個狀態，只要有偵測到人，就計算手腕距離)
            let wristsCollided = false;
            let leftWristPos = null;

            if (results.poseLandmarks) {
                const landmarks = results.poseLandmarks;
                const leftWrist = landmarks[15];
                const rightWrist = landmarks[16];

                if (leftWrist.visibility > 0.5 && rightWrist.visibility > 0.5) {
                    const dx = leftWrist.x - rightWrist.x;
                    const dy = leftWrist.y - rightWrist.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const threshold = 0.08;

                    // 記錄左手腕位置供畫面繪製特效（需轉換座標）
                    leftWristPos = { x: (1 - leftWrist.x) * WIDTH, y: leftWrist.y * HEIGHT };

                    if (distance < threshold) {
                        wristsCollided = true;
                    }
                }
            }

            // 3. 根據不同的遊戲狀態執行邏輯與繪製
            switch (currentState) {
                
                case STATES.TESTING:
                    // --- 測試模式邏輯 ---
                    // 繪製半透明遮罩，讓玩家看清楚測試提示
                    canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);

                    canvasCtx.fillStyle = '#00ff00';
                    canvasCtx.font = 'bold 30px Arial';
                    canvasCtx.textAlign = 'center';
                    canvasCtx.fillText("【 操控測試 Calibration 】", WIDTH / 2, HEIGHT / 2 - 60);

                    canvasCtx.fillStyle = 'white';
                    canvasCtx.font = '20px Arial';
                    canvasCtx.fillText("請退後至全身入鏡，並將雙手手腕相碰一次", WIDTH / 2, HEIGHT / 2 - 10);

                    if (wristsCollided) {
                        if (!isWristsTouching) {
                            isWristsTouching = true;
                            testSuccessTimer = 60; // 觸發成功，設定倒數格數（約 2 秒）
                        }
                    } else {
                        isWristsTouching = false;
                    }

                    // 畫出手腕碰撞特效
                    if (wristsCollided && leftWristPos) {
                        canvasCtx.beginPath();
                        canvasCtx.arc(leftWristPos.x, leftWristPos.y, 40, 0, 2 * Math.PI);
                        canvasCtx.strokeStyle = 'yellow';
                        canvasCtx.lineWidth = 5;
                        canvasCtx.stroke();
                    }

                    // 如果測試成功，顯示成功訊息並倒數進入遊戲
                    if (testSuccessTimer > 0) {
                        testSuccessTimer--;
                        canvasCtx.fillStyle = 'yellow';
                        canvasCtx.font = 'bold 24px Arial';
                        canvasCtx.fillText("測試成功！遊戲即將開始...", WIDTH / 2, HEIGHT / 2 + 50);

                        if (testSuccessTimer === 0) {
                            resetGame(); // 正式進入遊戲
                        }
                    }
                    break;

                case STATES.PLAYING:
                    // --- 遊戲進行中邏輯 ---
                    bird.velocity += bird.gravity;
                    bird.y += bird.velocity;

                    pipe.x -= pipe.speed;
                    if (pipe.x < -pipe.width) {
                        resetPipe();
                        score++;
                    }

                    // 處理遊戲中的手腕拍打
                    if (wristsCollided) {
                        if (!isWristsTouching) {
                            bird.velocity = bird.flapPower;
                            isWristsTouching = true;
                        }
                        // 遊戲中碰撞也畫個小黃圈提示
                        if (leftWristPos) {
                            canvasCtx.beginPath();
                            canvasCtx.arc(leftWristPos.x, leftWristPos.y, 20, 0, 2 * Math.PI);
                            canvasCtx.strokeStyle = 'yellow';
                            canvasCtx.lineWidth = 3;
                            canvasCtx.stroke();
                        }
                    } else {
                        isWristsTouching = false;
                    }

                    // 邊界與柱子碰撞偵測
                    if (bird.y - bird.radius < 0 || bird.y + bird.radius > HEIGHT) currentState = STATES.GAMEOVER;
                    if (bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + pipe.width) {
                        if (bird.y - bird.radius < pipe.topHeight || bird.y + bird.radius > pipe.topHeight + pipe.gap) {
                            currentState = STATES.GAMEOVER;
                        }
                    }

                    // 繪製遊戲元素
                    canvasCtx.fillStyle = 'limegreen';
                    canvasCtx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
                    canvasCtx.fillRect(pipe.x, pipe.topHeight + pipe.gap, pipe.width, HEIGHT - (pipe.topHeight + pipe.gap));

                    canvasCtx.beginPath();
                    canvasCtx.arc(bird.x, bird.y, bird.radius, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = 'red';
                    canvasCtx.fill();

                    canvasCtx.fillStyle = 'white';
                    canvasCtx.font = '30px Arial';
                    canvasCtx.textAlign = 'left';
                    canvasCtx.fillText(`Score: ${score}`, 20, 40);
                    break;

                case STATES.GAMEOVER:
                    // --- 遊戲結束邏輯 ---
                    canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);
                    
                    canvasCtx.fillStyle = 'red';
                    canvasCtx.font = '50px Arial';
                    canvasCtx.textAlign = 'center';
                    canvasCtx.fillText("GAME OVER", WIDTH / 2, HEIGHT / 2);
                    
                    canvasCtx.fillStyle = 'white';
                    canvasCtx.font = '20px Arial';
                    canvasCtx.fillText("Press 'R' to Restart", WIDTH / 2, HEIGHT / 2 + 40);
                    break;
            }

            canvasCtx.restore();
        });

        // 啟動攝影機
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
